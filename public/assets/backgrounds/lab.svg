<?xml version="1.0" encoding="utf-8"?>
<!-- Coding Lab background - layered parallax SVG -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="skyGrad" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#071028"/><stop offset="100%" stop-color="#071018"/></linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#skyGrad)"/>
  <!-- background: distant city windows -->
  <g id="background" opacity="0.5">
    <rect x="200" y="80" width="1200" height="240" fill="#081028"/>
  </g>
  <!-- midground: server racks and holograms -->
  <g id="midground">
    <rect x="260" y="260" width="1200" height="360" rx="16" fill="#0a1422" />
    <!-- holographic projector -->
    <g id="holo" transform="translate(720,360)">
      <ellipse cx="0" cy="0" rx="180" ry="40" fill="#06B6D4" opacity="0.06"/>
      <rect x="-60" y="-140" width="120" height="120" rx="10" fill="#06B6D4" opacity="0.12"/>
    </g>
  </g>
  <!-- foreground: desks -->
  <g id="foreground">
    <rect x="120" y="640" width="1360" height="160" fill="#071220"/>
    <g id="desk-left" transform="translate(200,600)">
      <rect x="0" y="0" width="300" height="80" rx="8" fill="#0f1724"/>
    </g>
  </g>
  <!-- atmosphere -->
  <g id="fx">
    <circle cx="420" cy="320" r="4" fill="#fff" opacity="0.08"/>
  </g>
</svg>