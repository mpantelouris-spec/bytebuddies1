<?xml version="1.0" encoding="utf-8"?>
<!-- Simple SVG idle animation for Raya: subtle bob + blink -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="100%" height="100%" fill="#0f1724"/>
  <g id="character" transform="translate(0,0)">
    <g id="shadow" transform="translate(256,470)">
      <ellipse cx="0" cy="0" rx="120" ry="30" fill="#000" opacity="0.45" />
    </g>
    <g id="body" transform="translate(256,220)">
      <circle id="head" cx="0" cy="-80" r="60" fill="#FFD7C4" />
      <rect id="torso" x="-76" y="-8" width="152" height="120" rx="14" fill="#6366F1"/>
      <g id="eyes">
        <ellipse id="eyeL" cx="-20" cy="-80" rx="10" ry="14" fill="#fff"/>
        <ellipse id="eyeR" cx="20" cy="-80" rx="10" ry="14" fill="#fff"/>
        <circle id="pL" cx="-20" cy="-78" r="5" fill="#111"/>
        <circle id="pR" cx="20" cy="-78" r="5" fill="#111"/>
        <!-- blink animation: scale Y of eyelid rectangles -->
        <rect id="lidL" x="-30" y="-88" width="20" height="28" fill="#FFD7C4" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" keyTimes="0;0.1;1"/>
        </rect>
        <rect id="lidR" x="10" y="-88" width="20" height="28" fill="#FFD7C4" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" keyTimes="0;0.1;1"/>
        </rect>
      </g>
    </g>
  </g>
  <!-- bob animation on group -->
  <animateTransform xlink:href="#character" attributeName="transform" type="translate" values="0 0; 0 4; 0 0" dur="2.2s" repeatCount="indefinite"/>
</svg>