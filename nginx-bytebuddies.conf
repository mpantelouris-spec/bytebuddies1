server {
    listen 80;
    server_name bytebuddies.technology www.bytebuddies.technology;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name bytebuddies.technology www.bytebuddies.technology;

    ssl_certificate /etc/letsencrypt/live/bytebuddies.technology/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bytebuddies.technology/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /home/ubuntu/bytebuddies;
    index index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Serve hashed assets directly — never fall back to index.html for these
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA: all other routes serve index.html
    location / {
        try_files $uri /index.html;
    }
}
