name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_GROQ_API_KEY: ${{ secrets.VITE_GROQ_API_KEY }}
        run: npm run build

      - name: Setup SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 129.151.144.92 >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh ubuntu@129.151.144.92 "rm -rf /home/ubuntu/bytebuddies/* && mkdir -p /home/ubuntu/bytebuddies"
          scp -r dist/* ubuntu@129.151.144.92:/home/ubuntu/bytebuddies/
          ssh ubuntu@129.151.144.92 "find /home/ubuntu/bytebuddies -type d -exec chmod 755 {} \; && find /home/ubuntu/bytebuddies -type f -exec chmod 644 {} \; && sudo nginx -t && sudo systemctl reload nginx"
